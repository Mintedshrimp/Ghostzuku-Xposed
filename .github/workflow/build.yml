name: Build

on:
  push:
    paths-ignore:
      - docs/**
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build
    runs-on: ubuntu-24.04
    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Set environments
        run: |
          {
            echo "repo=$(echo ${GITHUB_REPOSITORY#$GITHUB_REPOSITORY_OWNER/})"
            echo "version=v$(grep versionName version.properties | awk -F\= '{print $2}')"
            echo "commit=$(echo ${{ github.sha }} | cut -c-7)"
          } >> $GITHUB_ENV

      - name: Decode Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > keystore/release.jks

      - name: Write keystore properties
        env:
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: |
          cat > keystore/r0s.properties <<EOF
          keyAlias=$KEY_ALIAS
          keyPassword=$KEY_PASSWORD
          storeFile=release.jks
          storePassword=$STORE_PASSWORD
          EOF

      - name: Build
        run: |
          ./gradlew --no-daemon --warning-mode=all assembleRelease
          cp -f app/build/outputs/apk/release/app-release.apk ${{ env.repo }}-${{ env.version }}@${{ env.commit }}.apk

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.repo }}-${{ env.version }}@${{ env.commit }}
          path: ${{ env.repo }}-${{ env.version }}@${{ env.commit }}.apk
