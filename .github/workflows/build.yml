name: Build

on:
  push:
    paths-ignore:
      - docs/**
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build
    runs-on: ubuntu-24.04
    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Set environments
        run: |
          {
            echo "repo=$(echo ${GITHUB_REPOSITORY#$GITHUB_REPOSITORY_OWNER/})"
            echo "version=v$(grep versionName version.properties | awk -F\= '{print $2}')"
            echo "commit=$(echo ${{ github.sha }} | cut -c-7)"
          } >> $GITHUB_ENV

      - name: Generate Keystore
        run: |
         keytool -genkey -v \
         -keystore keystore/release.jks \
         -alias "${{ secrets.KEY_ALIAS }}" \
         -keyalg RSA \
         -keysize 2048 \
         -validity 10000 \
         -dname "CN=Ghostzuku, OU=Mintedshrimp, O=Ghostzuku, L=Unknown, S=Unknown, C=US" \
         -storepass "Bananayane2" \
         -keypass "Pokemonet5"

      - name: Write keystore properties
        run: |
         printf 'keyAlias=%s\nkeyPassword=%s\nstoreFile=release.jks\nstorePassword=%s\n' "${{ secrets.KEY_ALIAS }}" "${{ secrets.KEY_PASSWORD }}" "${{ secrets.STORE_PASSWORD }}" > keystore/r0s.properties
     
      - name: Build
        run: |
          ./gradlew --no-daemon --warning-mode=all assembleRelease
          cp -f app/build/outputs/apk/release/app-release.apk ${{ env.repo }}-${{ env.version }}@${{ env.commit }}.apk

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.repo }}-${{ env.version }}@${{ env.commit }}
          path: ${{ env.repo }}-${{ env.version }}@${{ env.commit }}.apk
